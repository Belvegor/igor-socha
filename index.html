document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:transform .2s ease,border-color .2s ease,color .2s ease\" style-hover=\"border-color:var(--ember);color:var(--ember-hi)\">Co robię →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:2;font-family:'Sometype Mono',monospace;font-size:.72rem;color:var(--smoke);letter-spacing:.14em;display:flex;flex-direction:column;align-items:center;gap:8px\">\n      <span style=\"width:1px;height:34px;background:linear-gradient(var(--ember),transparent);animation:scSlide 2s ease-in-out infinite\"><\u002Fspan>SCROLL\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section id=\"problem\" style=\"padding:104px 0;position:relative\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 28px\">\n      <p data-reveal=\"\" style=\"font-family:'Sometype Mono',monospace;font-size:.78rem;color:var(--ember);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Znasz to?<\u002Fp>\n      <h2 data-reveal=\"\" style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4rem);text-transform:uppercase;line-height:.95;margin-bottom:18px;color:var(--cream);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">trzy momenty,<br>w których ratuję kuchnię<\u002Fh2>\n      <div data-reveal=\"\" style=\"max-width:600px;color:var(--smoke);font-size:1.05rem;margin-bottom:54px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Każdy, kto prowadzi lokal, zna te scenariusze. Zwykle zostają dwa wyjścia: nadgodziny zmęczonej załogi albo cięcie jakości. Proponuję trzecie.<\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"border-top:1px solid var(--line);padding:28px 0;display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:baseline;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\" data-r=\"scn\"><span style=\"font-family:'Sometype Mono',monospace;font-size:.85rem;color:var(--ember)\">01<\u002Fspan><div><h3 style=\"font-family:'Archivo',sans-serif;font-size:1.3rem;font-weight:600;color:var(--cream);margin-bottom:4px\">Serwis nie do ogarnięcia<\u002Fh3><p style=\"color:var(--smoke);max-width:560px\">Piątkowy wieczór, na który nagle wchodzi pół miasta. Wchodzę na linię i zespół znów łapie oddech.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:1px solid var(--line);padding:28px 0;display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:baseline;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\" data-r=\"scn\"><span style=\"font-family:'Sometype Mono',monospace;font-size:.85rem;color:var(--ember)\">02<\u002Fspan><div><h3 style=\"font-family:'Archivo',sans-serif;font-size:1.3rem;font-weight:600;color:var(--cream);margin-bottom:4px\">Kucharz na L4<\u002Fh3><p style=\"color:var(--smoke);max-width:560px\">Nieobecność w środku sezonu nie musi oznaczać zamkniętej kuchni. Biorę zmianę na siebie.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:28px 0;display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:baseline;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\" data-r=\"scn\"><span style=\"font-family:'Sometype Mono',monospace;font-size:.85rem;color:var(--ember)\">03<\u002Fspan><div><h3 style=\"font-family:'Archivo',sans-serif;font-size:1.3rem;font-weight:600;color:var(--cream);margin-bottom:4px\">Produkcja przed szczytem<\u002Fh3><p style=\"color:var(--smoke);max-width:560px\">Długi weekend, event, sezon. Wesprę Twój zespół przy wzmożonej produkcji.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"uslugi\" style=\"padding:104px 0;position:relative\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 28px\">\n      <p data-reveal=\"\" style=\"font-family:'Sometype Mono',monospace;font-size:.78rem;color:var(--ember);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Zakres<\u002Fp>\n      <h2 data-reveal=\"\" style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4rem);text-transform:uppercase;line-height:.95;margin-bottom:18px;color:var(--cream);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">W czym pomagam<\u002Fh2>\n      <div data-reveal=\"\" style=\"max-width:600px;color:var(--smoke);font-size:1.05rem;margin-bottom:54px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Od pracy na ręce po pracę głową — wybierasz dokładnie to, czego potrzebujesz.<\u002Fdiv>\n      <div data-r=\"svc\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n        <div data-reveal=\"\" style=\"background:var(--char-2);border:1px solid var(--line);border-radius:4px;padding:30px 26px;position:relative;overflow:hidden;transition:transform .3s ease,border-color .3s ease;opacity:0;transform:translateY(28px)\" style-hover=\"transform:translateY(-4px);border-color:color-mix(in srgb,var(--line) 60%,var(--ember))\"><div style=\"font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--ember);margin-bottom:14px;letter-spacing:.04em\">01<\u002Fdiv><h3 style=\"font-size:1.18rem;font-weight:600;margin-bottom:8px;color:var(--cream)\">Wsparcie na serwisie<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Praca na linii i sekcji w szczycie, pomoc przy wydawce i mise en place.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--char-2);border:1px solid var(--line);border-radius:4px;padding:30px 26px;position:relative;overflow:hidden;transition:transform .3s ease,border-color .3s ease;opacity:0;transform:translateY(28px)\" style-hover=\"transform:translateY(-4px);border-color:color-mix(in srgb,var(--line) 60%,var(--ember))\"><div style=\"font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--ember);margin-bottom:14px;letter-spacing:.04em\">02<\u002Fdiv><h3 style=\"font-size:1.18rem;font-weight:600;margin-bottom:8px;color:var(--cream)\">Produkcja i prep<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Samodzielna produkcja półproduktów i zatowarowanie kuchni przed weekendem.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--char-2);border:1px solid var(--line);border-radius:4px;padding:30px 26px;position:relative;overflow:hidden;transition:transform .3s ease,border-color .3s ease;opacity:0;transform:translateY(28px)\" style-hover=\"transform:translateY(-4px);border-color:color-mix(in srgb,var(--line) 60%,var(--ember))\"><div style=\"font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--ember);margin-bottom:14px;letter-spacing:.04em\">03<\u002Fdiv><h3 style=\"font-size:1.18rem;font-weight:600;margin-bottom:8px;color:var(--cream)\">Consulting<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Układanie menu, kontrola food cost, organizacja pracy kuchni, HACCP.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"dlaczego\" style=\"padding:104px 0;position:relative;background:var(--char-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 28px\">\n      <p data-reveal=\"\" style=\"font-family:'Sometype Mono',monospace;font-size:.78rem;color:var(--ember);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Dla właściciela<\u002Fp>\n      <h2 data-reveal=\"\" style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4rem);text-transform:uppercase;line-height:.95;margin-bottom:18px;color:var(--cream);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Dlaczego to się opłaca<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"max-width:1120px;margin:36px auto 0;padding:0 28px\">\n      <div data-r=\"why\" style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:0\">\n        <div data-reveal=\"\" style=\"padding:38px 40px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\"><span style=\"font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--ember);line-height:1;display:block;margin-bottom:10px\">0 zł<\u002Fspan><h3 style=\"font-size:1.12rem;font-weight:600;margin-bottom:6px;color:var(--cream)\">Zero kosztów ukrytych<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Bez ZUS, urlopu, L4, badań i odpraw. Jedna, przewidywalna pozycja na fakturze.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"padding:38px 40px;border-bottom:1px solid var(--line);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\"><span style=\"font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--ember);line-height:1;display:block;margin-bottom:10px\">↕<\u002Fspan><h3 style=\"font-size:1.12rem;font-weight:600;margin-bottom:6px;color:var(--cream)\">Koszt skalowany do ruchu<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Płacisz za szczyt, nie za martwe poniedziałki. Labor cost pod kontrolą.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"padding:38px 40px;border-right:1px solid var(--line);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\"><span style=\"font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--ember);line-height:1;display:block;margin-bottom:10px\">0 dni<\u002Fspan><h3 style=\"font-size:1.12rem;font-weight:600;margin-bottom:6px;color:var(--cream)\">Zero ryzyka rekrutacji<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Nie tracisz tygodni na szukanie i wdrażanie. Wchodzę gotowy do pracy od pierwszej minuty.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"padding:38px 40px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\"><span style=\"font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--ember);line-height:1;display:block;margin-bottom:10px\">1:1<\u002Fspan><h3 style=\"font-size:1.12rem;font-weight:600;margin-bottom:6px;color:var(--cream)\">Konkret, nie anonim z agencji<\u002Fh3><p style=\"color:var(--smoke);font-size:.97rem\">Wiesz dokładnie, kto wchodzi Ci do kuchni: szef z nazwiskiem i doświadczeniem.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"omnie\" style=\"padding:104px 0;position:relative\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 28px\">\n      <div data-r=\"about\" style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n          <p style=\"font-family:'Sometype Mono',monospace;font-size:.78rem;color:var(--ember);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px\">Kim jestem<\u002Fp>\n          <h2 style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4rem);text-transform:uppercase;line-height:.95;margin-bottom:18px;color:var(--cream)\">Igor Socha<\u002Fh2>\n          <p style=\"color:var(--smoke);font-size:1.06rem;margin-bottom:16px\">Od ponad dekady w gastronomii — przeszedłem drogę od pomocy kuchennej po szefa kuchni.<\u002Fp>\n          <p style=\"color:var(--smoke);font-size:1.06rem;margin-bottom:16px\">Teraz oddaję to doświadczenie tam, gdzie jest potrzebne. Wiem, jak wygląda kuchnia pod presją — i jak ją z tej presji wyprowadzić.<\u002Fp>\n        <\u002Fdiv>\n        <ul data-reveal=\"\" style=\"list-style:none;display:flex;flex-direction:column;gap:0;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n          <li style=\"padding:18px 0;border-top:1px solid var(--line);display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'Sometype Mono',monospace;color:var(--ember);font-size:.82rem;min-width:54px\">10+<\u002Fspan><span style=\"color:var(--cream);font-weight:500\">lat w gastronomii<\u002Fspan><\u002Fli>\n          <li style=\"padding:18px 0;border-top:1px solid var(--line);display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'Sometype Mono',monospace;color:var(--ember);font-size:.82rem;min-width:54px\">🔥<\u002Fspan><span style=\"color:var(--cream);font-weight:500\">Kuchnia polska i śródziemnomorska<\u002Fspan><\u002Fli>\n          <li style=\"padding:18px 0;border-top:1px solid var(--line);display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'Sometype Mono',monospace;color:var(--ember);font-size:.82rem;min-width:54px\">⚙<\u002Fspan><span style=\"color:var(--cream);font-weight:500\">Food cost, HACCP, organizacja kuchni<\u002Fspan><\u002Fli>\n          <li style=\"padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'Sometype Mono',monospace;color:var(--ember);font-size:.82rem;min-width:54px\">◷<\u002Fspan><span style=\"color:var(--cream);font-weight:500\">Grafiki i zarządzanie zespołem<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"kontakt\" style=\"padding:104px 0;position:relative;text-align:center;overflow:hidden\">\n    <sc-if value=\"{{ effects }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute;left:50%;bottom:-60%;transform:translateX(-50%);width:140vw;height:80vh;border-radius:50%;background:radial-gradient(circle at center,color-mix(in srgb,var(--ember) 45%,transparent) 0%,color-mix(in srgb,var(--ember) 14%,transparent) 32%,transparent 62%);filter:blur(20px);opacity:.7;animation:scBreathe 7s ease-in-out infinite;pointer-events:none\"><\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 28px\">\n      <p data-reveal=\"\" style=\"position:relative;z-index:2;font-family:'Sometype Mono',monospace;font-size:.78rem;color:var(--ember);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Porozmawiajmy<\u002Fp>\n      <h2 data-reveal=\"\" style=\"position:relative;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4rem);text-transform:uppercase;line-height:.95;margin-bottom:18px;color:var(--cream);opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Masz lokal, w którym<br>czasem brakuje rąk?<\u002Fh2>\n      <p data-reveal=\"\" style=\"position:relative;z-index:2;color:var(--smoke);max-width:480px;margin:0 auto 34px;font-size:1.08rem;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Olsztyn i okolice. Dojazd do 20 km w cenie — dalej Warmia i Mazury po ustaleniu. Napisz albo zadzwoń, pogadajmy o Twojej kuchni.<\u002Fp>\n      <div data-reveal=\"\" style=\"position:relative;z-index:2;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n        <a href=\"mailto:igor_socha@yahoo.com\" style=\"font-family:'Sometype Mono',monospace;font-size:.9rem;font-weight:600;text-decoration:none;padding:15px 28px;border-radius:2px;letter-spacing:.02em;border:1px solid var(--line);color:var(--cream);transition:transform .2s ease,border-color .2s ease,color .2s ease\" style-hover=\"border-color:var(--ember);color:var(--ember-hi)\">igor_socha@yahoo.com<\u002Fa>\n        <a href=\"tel:+48509642366\" style=\"font-family:'Sometype Mono',monospace;font-size:.9rem;font-weight:600;text-decoration:none;padding:15px 28px;border-radius:2px;letter-spacing:.02em;background:var(--ember);color:var(--on-accent);transition:transform .2s ease,background .2s ease\" style-hover=\"background:var(--ember-hi);transform:translateY(-2px)\">Zadzwoń teraz<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\"><a href=\"tel:+48509642366\" style=\"position:relative;z-index:2;margin-top:30px;font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--cream);letter-spacing:.04em;text-decoration:none;display:inline-block;transition:color .2s ease\" style-hover=\"color:var(--ember-hi)\">+48 509 642 366<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1px solid var(--line);padding:34px 0;text-align:center;color:var(--smoke);font-family:'Sometype Mono',monospace;font-size:.8rem;letter-spacing:.04em\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 28px\">IGOR SOCHA <span style=\"color:var(--ember)\">·<\u002Fspan> SZEF KUCHNI NA GODZINY <span style=\"color:var(--ember)\">·<\u002Fspan> OLSZTYN, WARMIA-MAZURY<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 900},\n  &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Żar&quot;, &quot;options&quot;: [&quot;Żar&quot;, &quot;Stal&quot;, &quot;Mąka&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Wariant&quot;},\n  &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#e8662a&quot;, &quot;options&quot;: [&quot;#e8662a&quot;, &quot;#d9a441&quot;, &quot;#c0392b&quot;, &quot;#3fa7b8&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Wariant&quot;},\n  &quot;effects&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Wariant&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.navRef = React.createRef();\n    this.sparksRef = React.createRef();\n    this._onScroll = this._onScroll.bind(this);\n  }\n\n  themes = {\n    'Żar':  { '--char':'#0c0a09','--char-2':'#16130f','--line':'#322b23','--cream':'#f3ece1','--smoke':'#a89f93','--nav-bg':'rgba(12,10,9,.86)' },\n    'Stal': { '--char':'#0d1013','--char-2':'#151b21','--line':'#28323b','--cream':'#eef3f6','--smoke':'#93a1ac','--nav-bg':'rgba(13,16,19,.86)' },\n    'Mąka': { '--char':'#f3ece1','--char-2':'#eae0d0','--line':'#ddd0bd','--cream':'#1a1512','--smoke':'#7a6e5f','--nav-bg':'rgba(243,236,225,.9)' }\n  };\n\n  lighten(hex, amt){\n    hex = String(hex||'#e8662a').replace('#','');\n    if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');\n    const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);\n    const m=c=>Math.round(c+(255-c)*amt).toString(16).padStart(2,'0');\n    return '#'+m(r)+m(g)+m(b);\n  }\n\n  applyTheme(){\n    const root = this.rootRef.current;\n    if(!root) return;\n    const t = this.themes[this.props.theme] || this.themes['Żar'];\n    Object.entries(t).forEach(([k,v])=>root.style.setProperty(k,v));\n    const acc = this.props.accent || '#e8662a';\n    root.style.setProperty('--ember', acc);\n    root.style.setProperty('--ember-hi', this.lighten(acc, 0.28));\n    root.style.setProperty('--on-accent', '#12100e');\n  }\n\n  populateSparks(){\n    const box = this.sparksRef.current;\n    if(!box || box.childElementCount) return;\n    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;\n    for(let i=0;i<16;i++){\n      const s=document.createElement('span');\n      const size=(2+Math.random()*2);\n      s.style.cssText='position:absolute;bottom:-10px;border-radius:50%;background:var(--ember-hi);box-shadow:0 0 6px var(--ember-hi);opacity:0';\n      s.style.left=(8+Math.random()*84)+'%';\n      s.style.width=s.style.height=size+'px';\n      s.style.setProperty('--drift',((Math.random()-.5)*120)+'px');\n      s.style.animation=`scRise ${4+Math.random()*4}s ease-in ${Math.random()*6}s infinite`;\n      box.appendChild(s);\n    }\n  }\n\n  _onScroll(){\n    const nav = this.navRef.current;\n    if(!nav) return;\n    if(window.scrollY > 40){\n      nav.style.background='var(--nav-bg)';\n      nav.style.backdropFilter='blur(10px)';\n      nav.style.webkitBackdropFilter='blur(10px)';\n      nav.style.borderBottom='1px solid var(--line)';\n      nav.style.padding='12px 28px';\n    } else {\n      nav.style.background='transparent';\n      nav.style.backdropFilter='none';\n      nav.style.webkitBackdropFilter='none';\n      nav.style.borderBottom='1px solid transparent';\n      nav.style.padding='18px 28px';\n    }\n  }\n\n  componentDidMount(){\n    this.applyTheme();\n    window.addEventListener('scroll', this._onScroll);\n    this._onScroll();\n\n    const root = this.rootRef.current;\n    const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;\n    const els = root ? root.querySelectorAll('[data-reveal]') : [];\n    if(reduce){\n      els.forEach(el=>{ el.style.opacity='1'; el.style.transform='none'; });\n    } else {\n      this._io = new IntersectionObserver((entries)=>{\n        entries.forEach(e=>{\n          if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='none'; this._io.unobserve(e.target); }\n        });\n      },{threshold:.14});\n      els.forEach((el,i)=>{ el.style.transitionDelay=((i%4)*60)+'ms'; this._io.observe(el); });\n    }\n\n    if(this.props.effects !== false) this.populateSparks();\n  }\n\n  componentDidUpdate(){\n    this.applyTheme();\n    if(this.props.effects !== false) this.populateSparks();\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this._onScroll);\n    if(this._io) this._io.disconnect();\n  }\n\n  renderVals(){\n    return {\n      effects: this.props.effects !== false,\n      rootRef: this.rootRef,\n      navRef: this.navRef,\n      sparksRef: this.sparksRef\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
